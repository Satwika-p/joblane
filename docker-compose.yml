version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: job-recommendation-mongodb
    environment:
      MONGO_INITDB_DATABASE: job-recommendation
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - job-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job-recommendation-backend
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/job-recommendation
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: your_secret_key_here
      ML_SERVICE_URL: http://ml-service:5001
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    networks:
      - job-network
    restart: unless-stopped

  # ML Service (Python Flask)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: job-recommendation-ml
    environment:
      FLASK_ENV: production
    ports:
      - "5001:5001"
    networks:
      - job-network
    restart: unless-stopped

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job-recommendation-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - job-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  job-network:
    driver: bridge
